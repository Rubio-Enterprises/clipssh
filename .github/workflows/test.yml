name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    name: Shell tests (bats + shellcheck + kcov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats, shellcheck, kcov build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bats bats-assert bats-file bats-support \
            shellcheck \
            cmake binutils-dev libcurl4-openssl-dev zlib1g-dev \
            libdw-dev libiberty-dev libssl-dev libelf-dev g++

      - name: Build kcov from source
        # kcov is not packaged on Ubuntu 24.04; build the latest release.
        run: |
          curl -fsSL https://github.com/SimonKagstrom/kcov/archive/v42.tar.gz | tar xz -C /tmp
          cd /tmp/kcov-42
          mkdir build && cd build
          cmake .. > cmake.log 2>&1
          make -j"$(nproc)" > build.log 2>&1
          sudo make install > install.log 2>&1

      - name: Lint
        run: make lint

      - name: Run shell tests
        run: make test-shell

      - name: Measure coverage
        run: make test-coverage

      - name: Enforce coverage floor (80%)
        run: |
          coverage_json=$(find coverage -name coverage.json | head -1)
          pct=$(python3 -c "import json; d=json.load(open('$coverage_json')); print(next(f['percent_covered'] for f in d['files'] if f['file'].endswith('/clipssh')))")
          echo "clipssh coverage: $pct%"
          python3 -c "import sys; sys.exit(0 if float('$pct') >= 80 else 1)"

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  swift:
    name: Swift tests (XCTest via SPM)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run Swift tests
        working-directory: swift
        run: swift test
      - name: Build clipssh-paste release binary
        working-directory: swift
        run: swift build -c release

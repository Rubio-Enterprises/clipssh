name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    name: Shell tests (bats + shellcheck + kcov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats, shellcheck, kcov build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bats bats-assert bats-file bats-support \
            shellcheck \
            cmake binutils-dev zlib1g-dev libdw-dev g++

      - name: Build kcov from source
        # kcov isn't packaged on Ubuntu 24.04; build the latest release.
        run: |
          curl -fsSL https://github.com/SimonKagstrom/kcov/archive/v42.tar.gz | tar xz -C /tmp
          cd /tmp/kcov-42
          cmake -B build > /dev/null
          make -C build -j"$(nproc)" > /dev/null
          sudo make -C build install > /dev/null

      - name: Lint
        run: make lint

      - name: Run tests with coverage
        run: make test-coverage

      - name: Enforce coverage floor (80%)
        run: |
          pct=$(jq -r '.files[] | select(.file|endswith("/clipssh")).percent_covered' coverage/bats/coverage.json)
          echo "clipssh coverage: $pct%"
          awk "BEGIN{exit !($pct >= 80)}"

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  swift:
    name: Swift tests (XCTest via SPM)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run Swift tests
        working-directory: swift
        run: swift test
      - name: Build clipssh-paste release binary
        working-directory: swift
        run: swift build -c release

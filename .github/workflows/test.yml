name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    name: Shell tests (bats + shellcheck + kcov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: make setup
      - name: Lint + tests + coverage floor
        run: make check
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  swift:
    name: Swift tests (XCTest via SPM)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run Swift tests
        working-directory: swift
        run: swift test
      - name: Build clipssh-paste release binary
        working-directory: swift
        run: swift build -c release

name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: Shell tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: task setup
      - name: Lint + tests
        run: task lint test-shell
      - name: Coverage floor (Linux only)
        # kcov on macOS depends on Darwin tracing APIs that hang in CI; we
        # enforce the coverage floor on Linux, which is the authoritative
        # reading. macOS still runs lint + the full bats suite above.
        if: matrix.os == 'ubuntu-latest'
        run: task check-coverage
      - name: Upload coverage HTML report
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage/
          if-no-files-found: ignore

  swift:
    name: Swift tests (XCTest via SPM)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run Swift tests
        working-directory: swift
        run: swift test
      - name: Build clipssh-paste release binary
        working-directory: swift
        run: swift build -c release
